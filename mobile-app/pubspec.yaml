name: shakeel_traders_app
description: Shakeel Traders Distribution Order System - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local database
  sqflite: ^2.3.3
  path: ^1.9.0

  # HTTP client
  http: ^1.2.1

  # Secure storage for JWT & settings
  flutter_secure_storage: ^9.2.2

  # State management
  provider: ^6.1.2

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
